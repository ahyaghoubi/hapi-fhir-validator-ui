# UI + BFF only. Run a gRPC validator on the host (e.g. java -jar …/fhir-validator.jar on :50051), then:
#   docker compose up --build
# Open http://localhost:8080
#
# Memory: default cap below is enough for the BFF + static UI; raise if you proxy very large payloads.

services:
  ui:
    build:
      context: ..
      dockerfile: ui-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      FHIR_VALIDATOR_GRPC_HOST: host.docker.internal
      FHIR_VALIDATOR_GRPC_PORT: "50051"
      BFF_HOST: 0.0.0.0
      BFF_PORT: "8080"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
    extra_hosts:
      - "host.docker.internal:host-gateway"
